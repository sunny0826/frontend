name: "Raycast"
skill_name: "raycast-design"
philosophy: "Raycast's command-center polish translated onto the host application's existing theme colors. The language is dense, keyboard-first, glassy, and precise, but it never replaces `--primary`, `--background`, `--card`, or other project theme tokens. Differentiation comes from surface treatment, compact rhythm, command rows, 1px borders, and crisp motion instead of a new color palette."
primary_mode: "dark"
brand_domain: "productivity launcher / command center / extension marketplace"
brand_type: "ui-rich"
mono_for_code: true
mono_for_metrics: false

theme_policy:
  mode: "preserve-host-theme-colors"
  locked_source: "src/styles/theme.css"
  protected_tokens:
    - "--background"
    - "--foreground"
    - "--card"
    - "--primary"
    - "--primary-foreground"
    - "--secondary"
    - "--accent"
    - "--destructive"
    - "--border"
    - "--ring"
  instruction: "Do not replace the project's theme colors with Raycast red. Use the existing project accent for active states and use Raycast only for spacing, radius, surfaces, motion, and component composition."

observed_sources:
  - "https://www.raycast.com/"
  - "https://www.raycast.com/pro"
  - "https://www.raycast.com/store"
  - "https://www.raycast.com/core-features"
analysis_note: "Warning: analysis was done with URL fetching and static CSS inspection rather than Chrome DevTools computed styles. Border-radius and hero-background classifications are high-confidence where CSS exposed exact tokens, lower-confidence where imagery is rendered by remote assets."

observed_style:
  raycast_accent: "#FF6363"
  raycast_background: "#07080A"
  raycast_surface_gradient: "linear-gradient(137deg, rgba(17,18,20,.75) 4.87%, rgba(12,13,15,.9) 75.88%)"
  raycast_fonts: "Inter for UI, JetBrains Mono / Geist Mono for code and tiny technical labels."
  note: "Raycast's red is recorded for provenance only. This generated skill preserves the host project's existing green primary color."

primitives:
  colors:
    neutral:
      50: "#F8FAFC"
      100: "#F1F5F9"
      200: "#E2E8F0"
      300: "#CBD5E1"
      400: "#94A3B8"
      500: "#64748B"
      600: "#475569"
      700: "#334155"
      800: "#1E293B"
      900: "#0F172A"
      950: "#020617"
    brand:
      50: "#F0FDF4"
      100: "#DCFCE7"
      200: "#BBF7D0"
      300: "#86EFAC"
      400: "#4ADE80"
      500: "#22C55E"
      600: "#16A34A"
      700: "#15803D"
      800: "#166534"
      900: "#14532D"
      950: "#052E16"
    red:
      50: "#FEF2F2"
      500: "#EF4444"
      900: "#7F1D1D"
    green:
      50: "#F0FDF4"
      500: "#22C55E"
      900: "#14532D"
    amber:
      50: "#FFFBEB"
      500: "#F59E0B"
      900: "#78350F"
  spacing: [0, 2, 4, 6, 8, 12, 16, 20, 24, 32, 40, 48, 56, 64, 96]
  radii: [0, 4, 6, 8, 12, 16, 999]

tokens:
  colors:
    light:
      background: "{neutral.50}"
      surface1: "{neutral.100}"
      surface2: "{neutral.200}"
      surface3: "{neutral.300}"
      border: "{neutral.200}"
      border_visible: "{neutral.300}"
      text1: "{neutral.900}"
      text2: "{neutral.700}"
      text3: "{neutral.500}"
      text4: "{neutral.400}"
      accent: "{brand.500}"
      accent_subtle: "{brand.50}"
    dark:
      background: "{neutral.900}"
      surface1: "{neutral.800}"
      surface2: "{neutral.700}"
      surface3: "{neutral.600}"
      border: "{neutral.700}"
      border_visible: "{neutral.600}"
      text1: "{neutral.200}"
      text2: "{neutral.300}"
      text3: "{neutral.500}"
      text4: "{neutral.600}"
      accent: "{brand.500}"
      accent_subtle: "{brand.950}"
    success: "{green.500}"
    warning: "{amber.500}"
    error: "{red.500}"
  spacing:
    2xs: 2
    xs: 4
    sm: 8
    md: 16
    lg: 24
    xl: 32
    2xl: 48
    3xl: 64
    4xl: 96
  radii:
    element: 4
    control: 8
    component: 12
    container: 16
    pill: 999
  typography:
    display:
      family: "Inter"
      fallback: "ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      size: "48px"
      weight: 650
      line_height: 1.05
      letter_spacing: "0em"
    heading:
      family: "Inter"
      size: "32px"
      weight: 650
      line_height: 1.15
      letter_spacing: "0em"
    subheading:
      family: "Inter"
      size: "20px"
      weight: 600
      line_height: 1.3
      letter_spacing: "0em"
    body:
      family: "Inter"
      fallback: "ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      size: "14px"
      weight: 500
      line_height: 1.6
      letter_spacing: "0em"
    body_sm:
      family: "Inter"
      size: "13px"
      weight: 500
      line_height: 1.5
      letter_spacing: "0em"
    caption:
      family: "Inter"
      size: "12px"
      weight: 500
      line_height: 1.4
      letter_spacing: "0em"
    label:
      family: "JetBrains Mono"
      size: "11px"
      weight: 600
      line_height: 1.2
      letter_spacing: "0.02em"
    mono:
      family: "JetBrains Mono"
      fallback: "ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace"
      size: "12px"
      weight: 500
  elevation:
    strategy: "subtle-glass"
    level0: "none"
    level1_light: "inset 0 1px 0 rgba(255,255,255,.7), 0 1px 2px rgba(15,23,42,.06)"
    level1_dark: "inset 0 1px 0 rgba(255,255,255,.10), 0 0 0 1px rgba(255,255,255,.03)"
    level2_light: "inset 0 1px 0 rgba(255,255,255,.8), 0 12px 28px rgba(15,23,42,.12)"
    level2_dark: "inset 0 1px 0 rgba(255,255,255,.12), 0 16px 56px rgba(2,6,23,.45)"
    level3_light: "0 24px 64px rgba(15,23,42,.18)"
    level3_dark: "0 32px 80px rgba(2,6,23,.68), inset 0 1px 0 rgba(255,255,255,.12)"
  motion:
    personality: "mechanical-polished"
    easing: "cubic-bezier(.16, 1, .3, 1)"
    duration_fast: "120ms"
    duration_normal: "180ms"
    duration_slow: "300ms"
  hero_stage:
    preset: "sculptural-field"
    observed_style:
      description: "Raycast uses dark full-bleed stage imagery, glowing product windows, radial masks, and diagonal sculptural fields. Current sections combine glass app-window frames with soft top light and masked edges."
      where_used: ["homepage hero", "pro AI showcase", "store header"]
    background:
      medium: "sculptural"
      color_mode: "brand-tinted-neutral"
      saturation: "muted"
      light_source: "top"
      falloff: "radial"
      vignette: "subtle"
      texture: "clean"
      motion: "static"
      intensity: "subtle"
      safe_zone: "masked-for-text"
      color_palette: ["#0F172A", "#1E293B", "#334155", "#22C55E"]
    hero:
      subject: "device"
      placement: "center-lower"
      scale: "large"
      tint: "host-accent"
    relation:
      type: "halo"
      bleed: 24
    disclaimer: "Raycast imagery and icons are proprietary. Generated views use CSS/SVG approximations and the host theme accent, not Raycast assets or Raycast red."
  iconography:
    observed_style:
      description: "Custom outline icons and arrows with about 1.5px strokes, rounded line caps, simple geometric forms, and low visual density."
      stroke_weight: "regular (~1.5px)"
      corner_treatment: "soft"
      fill_style: "outline with occasional solid brand mark"
      form_language: "geometric"
      visual_density: "minimal to balanced"
    fallback_kit:
      name: "Tabler Icons"
      weight: "outline 1.5px"
      match_score: "high"
      match_reasoning: "Tabler matches Raycast's 1.5px outline weight and broad productivity vocabulary better than Lucide's heavier default stroke. The form is slightly more generic, but the stroke weight and density are closer."
      cdn: "https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.41.1/dist/tabler-icons.min.css"
      icon_class_prefix: "ti ti-"
    disclaimer: "Icons in generated previews are a best-match fallback from Tabler Icons. Raycast's actual icons are proprietary and are not redistributed."

components:
  button_primary:
    source: "derived-theme-locked"
    basis: "Raycast button height, radius, compact icon gap, and polished press state; color uses host --primary."
    background: "{brand.500}"
    color: "{neutral.900}"
    padding: "8px 12px"
    height: "36px"
    radius: "{radii.control}"
    font_weight: 600
    hover: "brighten background slightly and lift inner highlight"
  button_secondary:
    source: "observed"
    basis: "Raycast dark button uses transparent gradient, 1px white border, and inset top highlight."
    background: "linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.10))"
    color: "{neutral.200}"
    padding: "8px 12px"
    height: "36px"
    radius: "{radii.control}"
  card:
    source: "observed"
    basis: "Raycast cards use dark neutral gradients, subtle border, 12px radius, and inset highlight."
    background: "linear-gradient(137deg, rgba(30,41,59,.92), rgba(15,23,42,.96))"
    border: "1px solid rgba(255,255,255,.08)"
    radius: "{radii.component}"
    padding: "24px"
  command_row:
    source: "observed"
    basis: "Search/result rows are 40-48px tall, rounded to 6-8px, with hover using low-opacity white overlay."
    height: "44px"
    radius: "{radii.control}"
    padding: "8px 12px"
  input:
    source: "observed"
    basis: "Raycast search fields are transparent inside glass panels with bottom or full 1px border and compact command-key hints."
    height: "44px"
    radius: "{radii.control}"
    padding: "0 14px"
  nav:
    source: "observed"
    basis: "Floating glass nav, 16px radius, blurred background, subtle border, and compact 14px links."
    height: "58px"
    radius: "{radii.container}"
  tag:
    source: "observed"
    basis: "Pills and shortcut keys use compact mono labels, 4-6px radius for keys, full pill for filters."
    height: "24px"
    radius: "{radii.pill}"
  toggle:
    source: "derived"
    basis: "Raycast has segmented controls and filter pills; switch inherits compact rounded control geometry and neutral track."
    track: "40px x 24px"
    thumb: "18px"

app_screen:
  archetype: "list-detail"
  frame: "desktop"
  frame_params:
    title: "Command Center"
  content_seed: "A Raycast-like command center snapshot showing a search field, command list, selected extension detail, quick actions, keyboard shortcuts, and store-like metadata. The content is invented and does not copy Raycast product UI."
  required_tokens_checklist:
    - "text1, text2, text3, text4"
    - "surface1, surface2, surface3, border, border_visible"
    - "accent, accent_subtle, success, warning, error"
    - "body font for UI, mono font for command keys and snippets"
    - "radii.element, radii.control, radii.component, radii.pill"
